services:
  backend:
    build:
      context: ./backend
      target: builder   # 開発時はビルドステージを使用
    command: go run ./cmd/server
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      PORT: "8080"
      FRONTEND_ORIGIN: "http://localhost:5173"
      DATABASE_URL: "postgres://postgres:password@db:5432/webapp?sslmode=disable"
      JWT_SECRET: "dev-secret-change-in-production-at-least-32-chars"
      COOKIE_SECURE: "false"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_REDIRECT_URL: "http://localhost:8080/api/v1/auth/google/callback"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
      GITHUB_REDIRECT_URL: "http://localhost:8080/api/v1/auth/github/callback"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID}"
      MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET}"
      MICROSOFT_REDIRECT_URL: "http://localhost:8080/api/v1/auth/microsoft/callback"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app

  frontend:
    build:
      context: ./frontend
      target: builder
    command: pnpm dev --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "http://localhost:8080"

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
