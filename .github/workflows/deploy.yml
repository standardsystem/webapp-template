name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-northeast1
  BACKEND_SERVICE: webapp-template-api
  FRONTEND_SERVICE: webapp-template-web
  # 案件ごとに GitHub Repository Variables へ設定する値
  #   FRONTEND_ORIGIN: フロントエンド公開 URL（例: https://app.example.com）
  #   BACKEND_ORIGIN:  バックエンド公開 URL（例: https://api.example.com） OAuth redirect URL の組立に使用
  FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
  BACKEND_ORIGIN: ${{ vars.BACKEND_ORIGIN }}

jobs:
  # CI が成功した場合のみデプロイを実行
  check-ci:
    name: Verify CI Success
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed, proceeding with deployment"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: check-ci
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation 用

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build & Push Backend Image
        working-directory: backend
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/webapp/${{ env.BACKEND_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Validate required variables
        run: |
          : "${FRONTEND_ORIGIN:?vars.FRONTEND_ORIGIN must be set in repository variables}"
          : "${BACKEND_ORIGIN:?vars.BACKEND_ORIGIN must be set in repository variables}"

      - name: Deploy Backend to Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/webapp/${{ env.BACKEND_SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-secrets="DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,GITHUB_CLIENT_ID=github-client-id:latest,GITHUB_CLIENT_SECRET=github-client-secret:latest,MICROSOFT_CLIENT_ID=microsoft-client-id:latest,MICROSOFT_CLIENT_SECRET=microsoft-client-secret:latest" \
            --set-env-vars="GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},FRONTEND_ORIGIN=${{ env.FRONTEND_ORIGIN }},COOKIE_SECURE=true,GOOGLE_REDIRECT_URL=${{ env.BACKEND_ORIGIN }}/api/v1/auth/google/callback,GITHUB_REDIRECT_URL=${{ env.BACKEND_ORIGIN }}/api/v1/auth/github/callback,MICROSOFT_REDIRECT_URL=${{ env.BACKEND_ORIGIN }}/api/v1/auth/microsoft/callback" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=80

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build & Push Frontend Image
        working-directory: frontend
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/webapp/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Frontend to Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/webapp/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5
